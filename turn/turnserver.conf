# SSC coturn — Step 3
# OSS: https://github.com/coturn/coturn
# Replace STATIC_AUTH_SECRET and EXTERNAL_IP before deploy.

listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=REPLACE_WITH_SSC_TURN_SECRET
realm=supersecurechat.com
server-name=turn.supersecurechat.com
total-quota=100
stale-nonce=600
no-multicast-peers
no-cli
no-loopback-peers
no-software-attribute
external-ip=REPLACE_WITH_GCE_PUBLIC_IP

# Relay port range (align with mediasoup SFU media ports on same host)
min-port=40000
max-port=49999
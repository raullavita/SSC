appId: com.supersecurechat.desktop
productName: Super Secure Chat
publish:
  provider: github
  owner: raullavita
  repo: SSC
directories:
  output: dist
files:
  - main.js
  - preload.js
  - libsignalSession.js
  - groupSenderKeySession.js
  - secureFileStore.js
  - pushTokenStore.js
  - SSC_COMPAT_MODE
  - package.json
extraResources:
  - from: ../frontend/build
    to: app
    filter:
      - "**/*"
win:
  signAndEditExecutable: false
  target:
    - nsis
mac:
  target:
    - dmg
  artifactName: SSC-${version}.${ext}
linux:
  target:
    - AppImage
  artifactName: SSC-${version}.${ext}
protocols:
  - name: Super Secure Chat
    schemes:
      - ssc
nsis:
  artifactName: SSC-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Super Secure Chat
  uninstallDisplayName: Super Secure Chat ${version}
portable:
  artifactName: SSC-${version}-portable.${ext}
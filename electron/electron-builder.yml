appId: com.supersecurechat.desktop
productName: Super Secure Chat
publish:
  provider: github
  owner: raullavita
  repo: SSC
directories:
  output: dist
files:
  - main.js
  - preload.js
  - libsignalSession.js
  - groupSenderKeySession.js
  - package.json
extraResources:
  - from: ../frontend/build
    to: app
    filter:
      - "**/*"
win:
  target:
    - nsis
  artifactName: SSC-Setup-${version}.${ext}
mac:
  target:
    - dmg
  artifactName: SSC-${version}.${ext}
linux:
  target:
    - AppImage
  artifactName: SSC-${version}.${ext}
protocols:
  - name: Super Secure Chat
    schemes:
      - ssc
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
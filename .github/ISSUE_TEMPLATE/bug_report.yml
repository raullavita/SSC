name: Bug report
description: Something broken in SSC (installed app or local dev)
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not** paste passwords, JWT tokens, Mongo URLs, or production API keys.
        SSC is **install-only** (Android / desktop) — browser-tab chat is intentionally blocked.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows desktop
        - Android APK
        - macOS desktop
        - Backend (local dev)
        - Frontend tests only
        - Other
    validations:
      required: true

  - type: input
    attributes:
      label: SSC version
      description: e.g. desktop v1.0.12 or APK build date
      placeholder: "1.0.12"
    validations:
      required: true

  - type: textarea
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Numbered steps so a maintainer can try the same flow
      placeholder: |
        1. Open chat with contact X
        2. Send voice note
        3. App shows ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs or screenshots
      description: Redact any tokens or personal data

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I searched existing Issues for duplicates
          required: true
        - label: I am not pasting production secrets in this report
          required: true
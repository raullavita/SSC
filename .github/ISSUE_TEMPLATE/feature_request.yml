name: Feature idea
description: Suggest a product or technical improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        SSC is install-only (Android + desktop). Features should fit that model unless explicitly marked as maintainer-only.

  - type: textarea
    attributes:
      label: Problem or goal
      description: What user problem does this solve?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: willingness
    attributes:
      label: Can you help implement?
      options:
        - Yes — I can open a PR
        - Maybe — need guidance first
        - No — idea only
    validations:
      required: true
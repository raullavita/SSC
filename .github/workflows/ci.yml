name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          MONGO_URL: mongodb://localhost:27017
          JWT_SECRET: ci-test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn test:ci

  # OWASP ZAP baseline — runs when backend is reachable (Engine 9 skeleton).
  zap-baseline:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start API for scan
        working-directory: backend
        run: |
          uvicorn server:app --host 127.0.0.1 --port 8090 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8090/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          exit 1
        env:
          SSC_ENV: development
          MONGO_URL: mongodb://127.0.0.1:27017
          JWT_SECRET: ci-zap-secret
          SSC_ENFORCE_INSTALLED_CLIENT: "false"
          SSC_SFU_WS_URL: wss://sfu.supersecurechat.com
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://127.0.0.1:8090/api/health"
          cmd_options: "-a -d -T 15"
          allow_issue_writing: false
          fail_action: true
          rules_file_name: ".zap/rules.tsv"
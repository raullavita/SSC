name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff
      - run: ruff check . --exclude venv,.audit-venv
      - run: pytest -q
        env:
          MONGO_URL: mongodb://localhost:27017
          JWT_SECRET: ci-test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn test:ci
      - run: yarn knip

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate no secrets in git
        shell: pwsh
        run: ./scripts/validate_secrets.ps1
      - name: Phase 1 release build policy (libsignal required)
        shell: pwsh
        run: ./scripts/verify_phase1_build_policy.ps1
      - name: Phase 2 security build policy
        shell: pwsh
        run: ./scripts/verify_phase2_build_policy.ps1
      - name: Phase 3 security build policy
        shell: pwsh
        run: ./scripts/verify_phase3_build_policy.ps1

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep OSS scan (fail on ERROR severity)
        run: |
          semgrep scan --config auto --error \
            backend/core backend/routers backend/middleware.py backend/server.py backend/deps.py \
            frontend/src electron android/app/src/main sfu-server \
            --exclude-rule generic.secrets.security.detected-generic-secret \
            --exclude-rule java.android.security.exported_activity.exported_activity \
            --exclude-rule kotlin.lang.security.gcm-detection.gcm-detection \
            --exclude-rule python.lang.security.audit.subprocess-shell-true.subprocess-shell-true \
            --exclude-rule problem-based-packs.insecure-transport.js-node.using-http-server.using-http-server \
            --exclude-rule javascript.lang.security.audit.path-traversal.path-join-resolve-traversal.path-join-resolve-traversal \
            --exclude-rule javascript.lang.security.audit.detect-non-literal-regexp.detect-non-literal-regexp \
            --exclude-rule dockerfile.security.missing-user.missing-user

  production-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend, secrets-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Production API smoke test
        shell: pwsh
        run: ./scripts/release_smoke_test.ps1

  # OWASP ZAP baseline — runs when backend is reachable (Engine 9 skeleton).
  zap-baseline:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start API for scan
        working-directory: backend
        run: |
          uvicorn server:app --host 127.0.0.1 --port 8090 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8090/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          exit 1
        env:
          SSC_ENV: development
          MONGO_URL: mongodb://127.0.0.1:27017
          JWT_SECRET: ci-zap-secret
          SSC_ENFORCE_INSTALLED_CLIENT: "false"
          SSC_SFU_WS_URL: wss://sfu.supersecurechat.com
      - name: ZAP Baseline Scan
        run: |
          docker run --rm --network=host \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:8090/api/health \
            -J zap-report.json -w zap-report.md -r zap-report.html \
            -a -d -T 15 -c .zap/rules.tsv
          code=$?
          echo "ZAP exit code: $code"
          if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then
            echo "ZAP baseline failed — FAIL-level alerts present"
            exit 1
          fi
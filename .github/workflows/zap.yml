name: OWASP ZAP Baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          MONGO_URL=mongodb://127.0.0.1:27017/?directConnection=true
          DB_NAME=ssc-ci-zap
          JWT_SECRET=ci-only-jwt-secret-not-for-production-zap-scan
          CONTACT_GRAPH_PEPPER=ci-only-contact-graph-pepper-zap
          REDIS_URL=redis://localhost:6379/0
          ENV=development
          LOG_LEVEL=WARNING
          EOF

      - name: Start API
        run: |
          uvicorn server:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/api/health >/dev/null; then
              echo "API ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Security smoke (pre-ZAP)
        run: python scripts/security_smoke.py

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:8000/api/"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -I"
          allow_issue_writing: false
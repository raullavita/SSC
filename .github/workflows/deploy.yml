name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - docker-build

jobs:
  validate-production-ready:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'validate'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/deploy_proof.py
      - run: python scripts/run_engine10_gate.py

  docker-build:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'docker-build'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build API image
        working-directory: backend
        run: docker build -t ssc-api:ci .
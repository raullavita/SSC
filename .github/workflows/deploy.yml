name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - docker-build

jobs:
  validate-production-ready:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'validate'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/deploy_proof.py
      - run: python scripts/run_engine10_gate.py

  docker-build:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'docker-build'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build API image
        working-directory: backend
        run: docker build -t ssc-api:ci .
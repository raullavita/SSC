name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          JWT_SECRET: ci-release-secret

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn test:ci

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate no secrets in git
        shell: pwsh
        run: ./scripts/validate_secrets.ps1

  build-windows:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies (craco build)
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install
      - name: Build Electron Windows installer
        shell: pwsh
        run: ./scripts/build_electron.ps1
      - name: Upload Windows NSIS installer only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSC-Windows
          path: electron/dist/SSC-Setup-*.exe

  build-android:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      # CI uses the standard Android debug keystore (see android/app/build.gradle.kts fallback).
      # Production-signed APKs: set GitHub secrets SSC_ANDROID_KEYSTORE (base64), SSC_ANDROID_KEYSTORE_PASSWORD,
      # SSC_ANDROID_KEY_ALIAS, SSC_ANDROID_KEY_PASSWORD — or build locally via scripts/build_android.ps1.
      - name: Prepare Android debug keystore for CI signing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease
      - name: Upload Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSC-Android
          path: android/app/build/outputs/apk/release/*.apk

  production-smoke:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Production API smoke test
        shell: pwsh
        run: ./scripts/release_smoke_test.ps1

  publish-release:
    needs: [build-windows, build-android, production-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SSC-Windows
          path: dist/windows
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: SSC-Android
          path: dist/android
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/windows/*
            dist/android/*
          generate_release_notes: true
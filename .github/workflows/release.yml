name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          JWT_SECRET: ci-release-secret

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn test:ci

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate no secrets in git
        shell: pwsh
        run: ./scripts/validate_secrets.ps1

  build-windows:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build Electron Windows installer
        shell: pwsh
        run: ./scripts/build_electron.ps1
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSC-Windows
          path: electron/dist/*.exe

  build-android:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSC-Android
          path: android/app/build/outputs/apk/release/*.apk

  production-smoke:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Production API smoke test
        shell: pwsh
        run: ./scripts/release_smoke_test.ps1

  publish-release:
    needs: [build-windows, build-android, production-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SSC-Windows
          path: dist/windows
      - uses: actions/download-artifact@v4
        with:
          name: SSC-Android
          path: dist/android
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*
            dist/android/*
          generate_release_notes: true
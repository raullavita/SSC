name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          JWT_SECRET: ci-release-secret

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn test:ci

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate no secrets in git
        shell: pwsh
        run: ./scripts/validate_secrets.ps1

  build-windows:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies (craco build)
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install
      - name: Build Electron Windows installer
        shell: pwsh
        run: ./scripts/build_electron.ps1
      - name: Upload Windows NSIS installer only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSC-Windows
          path: electron/dist/SSC-Setup-*.exe

  build-android:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      # CI uses the standard Android debug keystore (see android/app/build.gradle.kts fallback).
      # Production-signed APKs: set GitHub secrets SSC_ANDROID_KEYSTORE (base64), SSC_ANDROID_KEYSTORE_PASSWORD,
      # SSC_ANDROID_KEY_ALIAS, SSC_ANDROID_KEY_PASSWORD — or build locally via scripts/build_android.ps1.
      - name: Prepare Android debug keystore for CI signing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease
      - name: Upload Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SSC-Android
          path: android/app/build/outputs/apk/release/*.apk

  production-smoke:
    needs: [backend-test, frontend-test, secrets-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Production API smoke test
        shell: pwsh
        run: ./scripts/release_smoke_test.ps1

  publish-release:
    needs: [build-windows, build-android, production-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: SSC-Windows
          path: dist/windows
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: SSC-Android
          path: dist/android
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/windows/*
            dist/android/*
          generate_release_notes: true
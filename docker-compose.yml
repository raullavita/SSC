services:
  mongo:
    image: mongo:7
    container_name: ssc-mongo
    ports:
      - "27017:27017"
    volumes:
      - ssc_mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ssc-redis
    ports:
      - "6379:6379"
    volumes:
      - ssc_redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: ssc-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      ENV: production
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    profiles:
      - prod

  sfu:
    build: ./sfu
    container_name: ssc-sfu
    ports:
      - "4443:4443"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    environment:
      SFU_PORT: "4443"
      SFU_ANNOUNCED_IP: "127.0.0.1"
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-must-differ-from-production}
    restart: unless-stopped
    profiles:
      - sfu

volumes:
  ssc_mongo_data:
  ssc_redis_data:

# Dev (Mongo + Redis only):
#   docker compose up -d
#   Set in backend/.env:
#     MONGO_URL=mongodb://localhost:27017
#     REDIS_URL=redis://localhost:6379/0
#
# Full stack (includes backend container):
#   docker compose --profile prod up -d --build
#
# SFU (mediasoup) for group calls 9+:
#   docker compose --profile sfu up -d --build
#   Set SFU_URL=ws://localhost:4443/ws and SFU_ENABLED=true in backend/.env
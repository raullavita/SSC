# Run on GCE host (Container-Optimized OS) alongside the SFU container.
# SFU listens on host :4443; Caddy terminates TLS on :443.
#
#   sudo docker compose -f docker-compose.tls.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: